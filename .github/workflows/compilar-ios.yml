name: Compilar Proyecto para iOS

on:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-14

    steps:
    - name: Descargar codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar dependencias del proyecto
      run: npm install

    - name: Crear carpeta web si no existe
      run: mkdir -p www

    - name: Instalar plataforma iOS de Capacitor
      run: |
        npx cap add ios || true
        npx cap sync ios

    - name: Compilar aplicacion nativa en Xcode
      run: |
        xcodebuild -workspace ios/App/App.xcworkspace \
                   -scheme App \
                   -configuration Debug \
                   -sdk iphoneos \
                   CODE_SIGNING_ALLOWED=NO \
                   clean build

    - name: Subir resultado comprimido
      uses: actions/upload-artifact@v4
      with:
        name: app-ios-compilada
        path: ios/App/build/
